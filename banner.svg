<svg width="680" height="200" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Strings — Get Anyone on Your Side</title>
<desc>Banner for the Strings AI communication strategy tool</desc>
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#f0f0ff"/>
    <stop offset="100%" stop-color="#e8e8ff"/>
  </linearGradient>
  <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#818cf8" stop-opacity="0.05"/>
