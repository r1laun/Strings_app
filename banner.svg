  <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
